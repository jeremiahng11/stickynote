services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3005}:3005"
    environment:
      PORT: 3005
      HOST: 0.0.0.0
      SESSION_SECRET: ${SESSION_SECRET:-stickyNotes123#}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-stickynotes}
      DB_PASSWORD: ${DB_PASSWORD:-stickynotes}
      DB_NAME: ${DB_NAME:-stickynotes}
      SMTP_SERVICE: ${SMTP_SERVICE:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-stickynotes}
      MARIADB_USER: ${DB_USER:-stickynotes}
      MARIADB_PASSWORD: ${DB_PASSWORD:-stickynotes}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
